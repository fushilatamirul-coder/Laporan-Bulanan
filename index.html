    ];
    const penjualanKlethikan = [
      { menu:"Peyek Kacang", jumlah:58, nominal:1450000 },{ menu:"Rambak Stick", jumlah:54, nominal:918000 },{ menu:"Karak", jumlah:28, nominal:476000 },{ menu:"Rengginang", jumlah:21, nominal:546000 },{ menu:"Slondok", jumlah:20, nominal:460000 },{ menu:"Amplang", jumlah:16, nominal:416000 },{ menu:"Peyek Rebon", jumlah:14, nominal:350000 },{ menu:"Stik Bawang", jumlah:8, nominal:184000 }
    ];

      { menu:"Pisang Goreng", jumlah:1899, nominal:34182000 },{ menu:"Mendoan", jumlah:787, nominal:13379000 },{ menu:"Bakwan Jagung", jumlah:707, nominal:12726000 },{ menu:"Telo Makrok", jumlah:207, nominal:3519000 },{ menu:"Tahu Tuna", jumlah:154, nominal:3696000 },{ menu:"Dimsum", jumlah:261, nominal:6787000 },{ menu:"Donat", jumlah:56, nominal:1792000 },{ menu:"Ubi Lumer", jumlah:132, nominal:2112000 },{ menu:"Spring Roll", jumlah:125, nominal:3000000 },{ menu:"French Fries", jumlah:187, nominal:4114000 },{ menu:"Roti Bakar Coklat Keju", jumlah:61, nominal:1792000 },{ menu:"Pisang Bakar Coklat Keju", jumlah:77, nominal:1617000 },{ menu:"Roti Bakar Hazelnut", jumlah:26, nominal:910000 },{ menu:"Chicken Wings", jumlah:60, nominal:2100000 },{ menu:"Pisang Bakar Original", jumlah:14, nominal:224000 },{ menu:"Roti Bakar Coklat", jumlah:12, nominal:420000 },{ menu:"Roti Bakar Keju", jumlah:3, nominal:105000 }
    ];
    const penjualanAlacarte = [
      { menu:"Bakmie Godog", porsi:405, nominal:13365000 },{ menu:"Bakmie Goreng", porsi:258, nominal:8514000 },{ menu:"Bakmie Campur", porsi:95, nominal:3135000 },{ menu:"Mie Lethek Godog", porsi:260, nominal:8580000 },{ menu:"Mie Lethek Goreng", porsi:73, nominal:2409000 },{ menu:"Kwetiau Goreng", porsi:125, nominal:4250000 },{ menu:"Nasgor PMG", porsi:352, nominal:11264000 },{ menu:"Nasgor Bebek", porsi:135, nominal:4860000 },{ menu:"Ayam Goreng", porsi:147, nominal:7938000 },{ menu:"Ayam Bakar", porsi:114, nominal:6270000 },{ menu:"Bebek Goreng", porsi:73, nominal:4088000 },{ menu:"Cordon Blue", porsi:58, nominal:3306000 },{ menu:"Rawon", porsi:121, nominal:7744000 },{ menu:"Wagyu Slice", porsi:66, nominal:3762000 },{ menu:"Sop Ayam", porsi:51, nominal:2448000 },{ menu:"Paket Syukur", porsi:12, nominal:4044000 },{ menu:"Paket Kembulan", porsi:8, nominal:2696000 }
    ];

    let currentData = JSON.parse(localStorage.getItem('pawonMbahGitoData')) || defaultData;

    function saveToStorage() {
      localStorage.setItem('pawonMbahGitoData', JSON.stringify(currentData));
      alert('✅ Data laporan tersimpan di browser.');
    }

    function renderWeb() {
      const container = document.getElementById('webContent');
      let html = '';
      html += '<div class="section-title">📦 Pembelian & Pemakaian Bahan</div><div class="grid-bahan">';
      const keys = ['tepungTerigu', 'minyakGoreng', 'berasMerah', 'berasPutih', 'gulaPasir'];
      keys.forEach(key => {
        const b = currentData[key];
        const stok = b.stokAwal;
        const totalJml = stok.jumlah + b.pembelian.reduce((s,i)=>s+i.jumlah,0);
        const totalPouch = (stok.pouch||0) + b.pembelian.reduce((s,i)=>s+(i.pouch||0),0);
        const totalNom = stok.nominal + b.pembelian.reduce((s,i)=>s+i.nominal,0);
        html += `<div class="card"><h3>${b.nama} <span style="font-size:0.8rem; font-weight:500;">Mei 2026</span></h3><table><tr><th>Tanggal</th><th>Jumlah</th>${b.satuanKecil?`<th>${b.satuanKecil.toUpperCase()}</th>`:''}<th>Nominal</th></tr>`;
        html += `<tr><td>Sisa Apr</td><td><input class="edit-stok-jml" data-key="${key}" data-field="jumlah" type="number" step="any" value="${stok.jumlah}"></td>${b.satuanKecil?`<td><input class="edit-stok-pouch" data-key="${key}" data-field="pouch" type="number" step="any" value="${stok.pouch||0}"></td>`:''}<td><input class="edit-stok-nom" data-key="${key}" data-field="nominal" type="number" value="${stok.nominal}"></td></tr>`;
        b.pembelian.forEach((item, idx) => {
          html += `<tr><td>${item.tanggal}</td><td><input class="edit-beli-jml" data-key="${key}" data-idx="${idx}" type="number" step="any" value="${item.jumlah}"></td>${b.satuanKecil?`<td><input class="edit-beli-pouch" data-key="${key}" data-idx="${idx}" type="number" step="any" value="${item.pouch||0}"></td>`:''}<td><input class="edit-beli-nom" data-key="${key}" data-idx="${idx}" type="number" value="${item.nominal}"></td></tr>`;
        });
        html += `<tr class="summary-row"><td><strong>TOTAL</strong></td><td>${totalJml} ${b.satuan}</td>${b.satuanKecil?`<td>${totalPouch} ${b.satuanKecil}</td>`:''}<td>Rp ${totalNom.toLocaleString()}</td></tr>`;
        html += `<tr><td>SISA</td><td><input id="sisa-${key}" class="sisa-input" data-key="${key}" type="number" step="any" value="${b.sisaManual||0}"></td>${b.satuanKecil?'<td></td>':''}<td id="sisaNominal-${key}">Rp 0</td></tr>`;
        html += `<tr><td>PEMAKAIAN</td><td id="pakai-${key}">0</td>${b.satuanKecil?'<td></td>':''}<td></td></tr>`;
        html += `<tr><td colspan="4"><span id="balance-${key}" class="balance-badge">BALANCE ✅</span></td></tr></table></div>`;
      });
      html += '</div>';
      html += '<div class="section-title">💰 Penjualan</div><div class="penjualan-grid">';
      const renderPenjualan = (title, data, isPorsi=true) => {
        let t = `<div class="card"><h3>${title}</h3><table><tr><th>No</th><th>Menu</th><th>${isPorsi?'Porsi':'Jumlah'}</th><th>Nominal</th></tr>`;
        let total = 0;
        data.forEach((item,i) => { t += `<tr><td>${i+1}</td><td>${item.menu}</td><td>${item.porsi||item.jumlah}</td><td>Rp ${item.nominal.toLocaleString()}</td></tr>`; total += item.nominal; });
        t += `<tr class="summary-row"><td colspan="3">TOTAL</td><td>Rp ${total.toLocaleString()}</td></tr></table></div>`;
        return t;
      };
      html += renderPenjualan('🍡 Jajanan', penjualanJajanan);
      html += renderPenjualan('🍮 Jenang', penjualanJenang, false);
      html += renderPenjualan('🥨 Klethikan', penjualanKlethikan, false);
      html += renderPenjualan('🍟 Snack', penjualanSnack, false);
      html += renderPenjualan('🍽️ Alacarte', penjualanAlacarte);
      html += '</div>';
      container.innerHTML = html;
      attachEvents();
      updateAllBalances();
    }

    function attachEvents() {
      document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', function(e) {
          const key = this.dataset.key;
          const field = this.dataset.field;
          const idx = this.dataset.idx;
          const value = parseFloat(this.value) || 0;
          if (this.classList.contains('edit-stok-jml')||this.classList.contains('edit-stok-pouch')||this.classList.contains('edit-stok-nom')) {
            currentData[key].stokAwal[field] = value;
          } else if (this.classList.contains('edit-beli-jml')||this.classList.contains('edit-beli-pouch')||this.classList.contains('edit-beli-nom')) {
            currentData[key].pembelian[idx][field] = value;
          } else if (this.classList.contains('sisa-input')) {
            currentData[key].sisaManual = value;
          }
          updateAllBalances();
        });
      });
    }

    function updateAllBalances() {
      ['tepungTerigu','minyakGoreng','berasMerah','berasPutih','gulaPasir'].forEach(key => {
        const b = currentData[key];
        const totalJml = b.stokAwal.jumlah + b.pembelian.reduce((s,i)=>s+i.jumlah,0);
        const sisa = parseFloat(document.getElementById(`sisa-${key}`)?.value) || 0;
        const pemakaian = totalJml - sisa;
        document.getElementById(`pakai-${key}`).innerText = pemakaian.toFixed(2);
        const balance = Math.abs((sisa+pemakaian)-totalJml) < 0.01;
        const badge = document.getElementById(`balance-${key}`);
        if(badge) {
          badge.textContent = balance ? 'BALANCE ✅' : 'TIDAK BALANCE ⚠️';
          badge.className = balance ? 'balance-badge' : 'balance-badge unbalance-badge';
        }
        const totalNom = b.stokAwal.nominal + b.pembelian.reduce((s,i)=>s+i.nominal,0);
        document.getElementById(`sisaNominal-${key}`).innerText = 'Rp '+Math.round(sisa*(totalNom/totalJml)).toLocaleString();
      });
    }

    async function exportPDF() {
      const pdfContainer = document.getElementById('pdf-export-container');
      const sums = {
        Jajanan: penjualanJajanan.reduce((s,i)=>s+i.nominal,0),
        Jenang: penjualanJenang.reduce((s,i)=>s+i.nominal,0),
        Klethikan: penjualanKlethikan.reduce((s,i)=>s+i.nominal,0),
        Snack: penjualanSnack.reduce((s,i)=>s+i.nominal,0),
        Alacarte: penjualanAlacarte.reduce((s,i)=>s+i.nominal,0)
      };
      const grandTotal = Object.values(sums).reduce((a,b)=>a+b,0);
      
      let pdfHtml = `
      <style>
        body { font-family: 'Georgia', serif; margin:0; padding:35px; color:#2e2416; }
        .kop { text-align:center; border-bottom:3px double #b5976b; padding-bottom:15px; margin-bottom:25px; }
        .kop h2 { font-size:28px; margin:0; color:#4d3822; letter-spacing:1px; }
        .kop p { font-style:italic; color:#5e4a34; }
        h3 { color:#3e2f20; border-left:6px solid #c6a47e; padding-left:12px; }
        table { width:100%; border-collapse:collapse; margin:18px 0; font-size:13px; }
        th { background:#f3ede5; border:1px solid #c9b99a; padding:8px; font-weight:bold; }
        td { border:1px solid #d6c8b2; padding:7px; }
        .balance { color:#1c4b2d; font-weight:bold; }
        .unbalance { color:#b13e3e; }
        .total-row { background:#faf6ef; font-weight:bold; }
      </style>
      <div class="kop">
        <h2>🍲 PAWON MBAH GITO</h2>
        <p>Laporan Pembelian Bahan, Pemakaian & Penjualan — Mei 2026</p>
        <p>Dokumen Resmi Bagian Keuangan</p>
      </div>
      <h3>📦 RINCIAN BAHAN</h3>
      `;
      
      ['tepungTerigu','minyakGoreng','berasMerah','berasPutih','gulaPasir'].forEach(key => {
        const b = currentData[key];
        const totalJml = b.stokAwal.jumlah + b.pembelian.reduce((s,i)=>s+i.jumlah,0);
        const totalNom = b.stokAwal.nominal + b.pembelian.reduce((s,i)=>s+i.nominal,0);
        const sisa = parseFloat(document.getElementById(`sisa-${key}`)?.value) || 0;
        const pemakaian = totalJml - sisa;
        pdfHtml += `<h4>${b.nama}</h4><table><tr><th>Tanggal</th><th>Jumlah</th><th>Nominal</th></tr>`;
        pdfHtml += `<tr><td>Sisa April</td><td>${b.stokAwal.jumlah} ${b.satuan}</td><td>Rp ${b.stokAwal.nominal.toLocaleString()}</td></tr>`;
        b.pembelian.forEach(p => pdfHtml += `<tr><td>${p.tanggal}</td><td>${p.jumlah} ${b.satuan}</td><td>Rp ${p.nominal.toLocaleString()}</td></tr>`);
        pdfHtml += `<tr class="total-row"><td>TOTAL</td><td>${totalJml} ${b.satuan}</td><td>Rp ${totalNom.toLocaleString()}</td></tr>`;
        pdfHtml += `<tr><td>SISA</td><td>${sisa} ${b.satuan}</td><td>Rp ${Math.round(sisa*(totalNom/totalJml)).toLocaleString()}</td></tr>`;
        pdfHtml += `<tr><td>PEMAKAIAN</td><td>${pemakaian.toFixed(2)} ${b.satuan}</td><td></td></tr>`;
        pdfHtml += `<tr><td colspan="3" class="${Math.abs(sisa+pemakaian-totalJml)<0.01?'balance':'unbalance'}">KETERANGAN : ${Math.abs(sisa+pemakaian-totalJml)<0.01?'BALANCE':'TIDAK BALANCE'}</td></tr></table>`;
      });
      
      pdfHtml += `<h3>💰 REKAP PENJUALAN</h3><table><tr><th>Kategori</th><th>Total Penjualan</th></tr>`;
      for(let [k,v] of Object.entries(sums)) pdfHtml += `<tr><td>${k}</td><td>Rp ${v.toLocaleString()}</td></tr>`;
      pdfHtml += `<tr class="total-row"><td><strong>TOTAL KESELURUHAN</strong></td><td><strong>Rp ${grandTotal.toLocaleString()}</strong></td></tr></table>`;
      pdfHtml += `<p style="margin-top:35px; font-style:italic;">Dicetak oleh Bagian Keuangan, ${new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</p>`;
      
      pdfContainer.innerHTML = pdfHtml;
      
      const canvas = await html2canvas(pdfContainer, { scale: 2, backgroundColor: '#ffffff' });
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const imgWidth = pageWidth - 20;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;
      
      let heightLeft = imgHeight;
      let position = 10;
      pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
      heightLeft -= (pageHeight - 20);
      
      while (heightLeft > 0) {
        position = -(pageHeight - 20) + 10;
        pdf.addPage();
        pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
        heightLeft -= (pageHeight - 20);
      }
      
      pdf.save('Laporan_Keuangan_Pawon_Mbah_Gito_Mei2026.pdf');
    }

    document.getElementById('saveDataBtn').addEventListener('click', saveToStorage);
    document.getElementById('exportPdfBtn').addEventListener('click', exportPDF);
    renderWeb();
  })();
</script>
</body>
</html>
