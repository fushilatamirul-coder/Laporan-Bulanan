      justify-content: space-between;

      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.5px;
    }
    .header-left .sub {
      font-size: 0.9rem;
      opacity: 0.85;
      margin-top: 4px;
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;

    .btn {
      border: none;

      font-weight: 600;

    .btn-export {

    .content {

      font-weight: 700;

      margin: 28px 0 16px 0;
      color: #4a3320;
      border-left: 8px solid #b6936c;
      padding-left: 16px;

    .grid-bahan {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 24px;
      margin-bottom: 20px;
    }
    .card {
      background: #fefcf8;
      border: 1px solid #ede3d3;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.03);

    .card h3 {

      font-size: 1.2rem;

      color: #4a3320;

      gap: 6px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    th {
      background: #f3ede5;
      padding: 10px 8px;
      text-align: left;
      font-weight: 700;
      color: #4a3320;
    }
    td {
      padding: 8px;
      border-bottom: 1px solid #eee5d8;
    }
    input, .editable-cell {
      background: transparent;
      border: 1px solid transparent;
      padding: 6px 4px;
      width: 100%;
      font-family: inherit;
      font-size: 0.85rem;
      border-radius: 6px;
      transition: 0.2s;
    }
    input:focus, .editable-cell:focus {
      outline: none;
      border-color: #b6936c;
      background: #fffbf5;
      box-shadow: 0 0 0 2px rgba(182,147,108,0.2);
    }
    .summary-row {
      font-weight: 700;
      background: #f9f5ed;
    }
    .balance-badge {
      background: #d4edda;
      color: #155724;
      padding: 4px 12px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.75rem;
      display: inline-block;
    }
    .unbalance-badge {
      background: #ffe2e2;
      color: #a12b2b;
    }
    .penjualan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }
    .footer-note {
      margin-top: 30px;
      text-align: center;
      color: #8b7355;
      font-size: 0.9rem;
    }
    /* PDF Export specific styling (hidden on web) */
    #pdf-export-container {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 1000px;
      background: white;

      #pdf-export-container { position: absolute; left: 0; top: 0; }
    }

</head>

    // ---------- HELPER: HITUNG BALANCE & RINGKASAN BAHAN ----------
    function hitungBahan(bahan) {
      const stok = bahan.stokAwal;
      const beli = bahan.pembelian;
      const totalJumlah = stok.jumlah + beli.reduce((s, b) => s + b.jumlah, 0);
      const totalPouch = (stok.pouch || 0) + beli.reduce((s, b) => s + (b.pouch || 0), 0);
      const totalNominal = stok.nominal + beli.reduce((s, b) => s + b.nominal, 0);
      
      let pemakaianJumlah = 0;
      let sisaJumlah = 0;
      if (bahan.pemakaianManual !== undefined) {
        pemakaianJumlah = bahan.pemakaianManual;
        sisaJumlah = totalJumlah - pemakaianJumlah;
      } else {
        // default: pemakaian = total - sisa (sisa berdasarkan input sisa terakhir?)
        // Untuk fleksibilitas, kita akan hitung pemakaian dari selisih total dan sisa yang diedit user.
        // Tapi di UI kita tampilkan field sisa yang bisa diedit -> pemakaian otomatis = total - sisa.
      }
      const balance = Math.abs((sisaJumlah + pemakaianJumlah) - totalJumlah) < 0.01;
      return { totalJumlah, totalPouch, totalNominal, pemakaianJumlah, sisaJumlah, balance };
    }

    // ---------- RENDER WEB VIEW ----------
    function renderWeb() {
      const container = document.getElementById('webContent');
      let html = '';
      
      // BAHAN BAKU
      html += '<div class="section-title">📦 Pembelian & Pemakaian Bahan</div><div class="grid-bahan">';
      const bahanKeys = ['tepungTerigu', 'minyakGoreng', 'berasMerah', 'berasPutih', 'gulaPasir'];
      const bahanMap = {
        tepungTerigu: currentData.tepungTerigu,
        minyakGoreng: currentData.minyakGoreng,
        berasMerah: currentData.berasMerah,
        berasPutih: currentData.berasPutih,
        gulaPasir: currentData.gulaPasir
      };

      for (let key of bahanKeys) {
        const b = bahanMap[key];
        const stok = b.stokAwal;
        const beli = b.pembelian;
        const totalJml = stok.jumlah + beli.reduce((s,i)=>s+i.jumlah,0);
        const totalPouch = (stok.pouch||0) + beli.reduce((s,i)=>s+(i.pouch||0),0);
        const totalNom = stok.nominal + beli.reduce((s,i)=>s+i.nominal,0);
        
        html += `<div class="card" data-bahan="${key}">
          <h3>${b.nama} <span style="font-size:0.8rem;">Mei 2026</span></h3>
          <table><tr><th>Tanggal</th><th>Jumlah</th>${b.satuanKecil?`<th>${b.satuanKecil.toUpperCase()}</th>`:''}<th>Nominal</th></tr>`;
        
        html += `<tr><td>Sisa Apr</td>
          <td><input class="edit-stok-jml" data-key="${key}" data-field="jumlah" type="number" step="any" value="${stok.jumlah}"></td>
          ${b.satuanKecil ? `<td><input class="edit-stok-pouch" data-key="${key}" data-field="pouch" type="number" step="any" value="${stok.pouch||0}"></td>` : ''}
          <td><input class="edit-stok-nom" data-key="${key}" data-field="nominal" type="number" value="${stok.nominal}"></td></tr>`;
        
        beli.forEach((item, idx) => {
          html += `<tr><td>${item.tanggal}</td>
            <td><input class="edit-beli-jml" data-key="${key}" data-idx="${idx}" type="number" step="any" value="${item.jumlah}"></td>
            ${b.satuanKecil ? `<td><input class="edit-beli-pouch" data-key="${key}" data-idx="${idx}" type="number" step="any" value="${item.pouch||0}"></td>` : ''}
            <td><input class="edit-beli-nom" data-key="${key}" data-idx="${idx}" type="number" value="${item.nominal}"></td></tr>`;
        });
        
        html += `<tr class="summary-row"><td><strong>TOTAL</strong></td><td>${totalJml} ${b.satuan}</td>${b.satuanKecil?`<td>${totalPouch} ${b.satuanKecil}</td>`:''}<td>Rp ${totalNom.toLocaleString()}</td></tr>`;
        
        const sisaId = `sisa-${key}`;
        const pemakaianId = `pakai-${key}`;
        html += `<tr><td>SISA</td><td><input id="${sisaId}" class="sisa-input" data-key="${key}" type="number" step="any" value="${(b.sisaManual||0)}"></td>${b.satuanKecil?`<td></td>`:''}<td id="sisaNominal-${key}">Rp 0</td></tr>`;
        html += `<tr><td>PEMAKAIAN</td><td id="${pemakaianId}">0</td>${b.satuanKecil?`<td></td>`:''}<td></td></tr>`;
        html += `<tr><td colspan="4"><span id="balance-${key}" class="balance-badge">BALANCE ✅</span></td></tr>`;
        html += `</table></div>`;
      }
      html += '</div>';

      // PENJUALAN SECTION
      html += '<div class="section-title">💰 Penjualan</div>';
      const renderPenjualanTable = (title, data, isPorsi=true) => {
        let t = `<div class="card"><h3>${title}</h3><table><tr><th>No</th><th>Menu</th><th>${isPorsi?'Porsi':'Jumlah'}</th><th>Nominal</th></tr>`;
        let total = 0;
        data.forEach((item, i) => {
          t += `<tr><td>${i+1}</td><td>${item.menu}</td><td>${item.porsi||item.jumlah}</td><td>Rp ${item.nominal.toLocaleString()}</td></tr>`;
          total += item.nominal;
        });
        t += `<tr class="summary-row"><td colspan="3">TOTAL</td><td>Rp ${total.toLocaleString()}</td></tr></table></div>`;
        return t;
      };

      html += renderPenjualanTable('🍽️ Alacarte', penjualanAlacarte);
      html += '</div>';

    function attachEventListeners() {
      document.querySelectorAll('.edit-stok-jml, .edit-stok-pouch, .edit-stok-nom, .edit-beli-jml, .edit-beli-pouch, .edit-beli-nom, .sisa-input').forEach(input => {
        input.addEventListener('input', function(e) {
          const key = this.dataset.key;
          const field = this.dataset.field;
          const idx = this.dataset.idx;
          const value = parseFloat(this.value) || 0;
          
          if (this.classList.contains('edit-stok-jml') || this.classList.contains('edit-stok-pouch') || this.classList.contains('edit-stok-nom')) {
            currentData[key].stokAwal[field] = value;
          } else if (this.classList.contains('edit-beli-jml') || this.classList.contains('edit-beli-pouch') || this.classList.contains('edit-beli-nom')) {
            currentData[key].pembelian[idx][field] = value;
          } else if (this.classList.contains('sisa-input')) {
            currentData[key].sisaManual = value;
          }
          updateAllBalances();
        });
      });
    }

    function updateAllBalances() {
      const keys = ['tepungTerigu', 'minyakGoreng', 'berasMerah', 'berasPutih', 'gulaPasir'];
      keys.forEach(key => {
        const b = currentData[key];
        const stok = b.stokAwal;
        const totalJml = stok.jumlah + b.pembelian.reduce((s,i)=>s+i.jumlah,0);
        const sisaInput = document.getElementById(`sisa-${key}`);
        let sisa = parseFloat(sisaInput?.value) || 0;
        const pemakaian = totalJml - sisa;
        document.getElementById(`pakai-${key}`).innerText = pemakaian.toFixed(2);
        const balance = Math.abs((sisa + pemakaian) - totalJml) < 0.01;
        const badge = document.getElementById(`balance-${key}`);
        if (badge) {
          badge.textContent = balance ? 'BALANCE ✅' : 'TIDAK BALANCE ⚠️';
          badge.className = balance ? 'balance-badge' : 'balance-badge unbalance-badge';
        }
        // estimasi nominal sisa (proporsional)
        const totalNom = stok.nominal + b.pembelian.reduce((s,i)=>s+i.nominal,0);
        const hargaPerUnit = totalJml ? totalNom / totalJml : 0;
        document.getElementById(`sisaNominal-${key}`).innerText = 'Rp ' + Math.round(sisa * hargaPerUnit).toLocaleString();
      });
    }

      const keys = ['tepungTerigu','minyakGoreng','berasMerah','berasPutih','gulaPasir'];

        const b = currentData[key];
        pdfHtml += `<h4>${b.nama}</h4><table><tr><th>Tanggal</th><th>Jumlah</th><th>Nominal</th></tr>`;
        pdfHtml += `<tr><td>Sisa April</td><td>${b.stokAwal.jumlah} ${b.satuan}</td><td>Rp ${b.stokAwal.nominal.toLocaleString()}</td></tr>`;
        b.pembelian.forEach(p=> pdfHtml += `<tr><td>${p.tanggal}</td><td>${p.jumlah} ${b.satuan}</td><td>Rp ${p.nominal.toLocaleString()}</td></tr>`);
        const totalJml = b.stokAwal.jumlah + b.pembelian.reduce((s,i)=>s+i.jumlah,0);
        const totalNom = b.stokAwal.nominal + b.pembelian.reduce((s,i)=>s+i.nominal,0);
        const sisa = parseFloat(document.getElementById(`sisa-${key}`)?.value) || 0;
        pdfHtml += `<tr><td><strong>TOTAL</strong></td><td>${totalJml}</td><td>Rp ${totalNom.toLocaleString()}</td></tr>`;
        pdfHtml += `<tr><td>SISA</td><td>${sisa}</td><td>Rp ${Math.round(sisa*(totalNom/totalJml)).toLocaleString()}</td></tr>`;
        pdfHtml += `<tr><td>PEMAKAIAN</td><td>${(totalJml-sisa).toFixed(2)}</td><td></td></tr>`;
        pdfHtml += `<tr><td colspan="3" class="balance">KETERANGAN : ${Math.abs(sisa+(totalJml-sisa)-totalJml)<0.01?'BALANCE':'TIDAK BALANCE'}</td></tr></table>`;
      });
      
      pdfHtml += `<h3>💰 Total Penjualan</h3><table><tr><th>Kategori</th><th>Total</th></tr>`;
      const sums = {
        Jajanan: penjualanJajanan.reduce((s,i)=>s+i.nominal,0),
        Jenang: penjualanJenang.reduce((s,i)=>s+i.nominal,0),
        Klethikan: penjualanKlethikan.reduce((s,i)=>s+i.nominal,0),
        Snack: penjualanSnack.reduce((s,i)=>s+i.nominal,0),
        Alacarte: penjualanAlacarte.reduce((s,i)=>s+i.nominal,0)
      };
      for(let [k,v] of Object.entries(sums)) pdfHtml += `<tr><td>${k}</td><td>Rp ${v.toLocaleString()}</td></tr>`;
      pdfHtml += `<tr><td><strong>TOTAL KESELURUHAN</strong></td><td><strong>Rp ${Object.values(sums).reduce((a,b)=>a+b,0).toLocaleString()}</strong></td></tr></table>`;
      pdfHtml += `<p style="margin-top:40px;">Diterbitkan oleh Bagian Keuangan, ${new Date().toLocaleDateString()}</p>`;
      
      pdfContainer.innerHTML = pdfHtml;
      
      const canvas = await html2canvas(pdfContainer, { scale: 2 });
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const imgWidth = 210;
      const imgHeight = canvas.height * imgWidth / canvas.width;
      pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
      pdf.save('Laporan_Keuangan_Pawon_Mbah_Gito_Mei2026.pdf');
    }

    document.getElementById('saveDataBtn').addEventListener('click', saveToStorage);
    document.getElementById('exportPdfBtn').addEventListener('click', exportPDF);
    
    renderWeb();
  })();
</script>
</body>
</html>
